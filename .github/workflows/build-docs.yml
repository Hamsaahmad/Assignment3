name: Generate Doxygen PDF

on:
  push:
    branches: [ main ]

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Doxygen and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz texlive-latex-base texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra

      - name: Run Doxygen
        run: doxygen Doxyfile # Ensure you have a Doxyfile in your root

      - name: Compile PDF
        run: |
          cd docs/latex # Doxygen usually outputs LaTeX here
          make
          mv refman.pdf ../vm_services_docs.pdf

      - name: Deploy to docs-pdf branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: docs-pdf
          keep_files: true
